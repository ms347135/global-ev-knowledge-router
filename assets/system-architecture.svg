<svg width="1600" height="1040" viewBox="0 0 1600 1040" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="1040" rx="28" fill="#091321"/>
  <text x="72" y="88" fill="white" font-size="42" font-weight="700" font-family="Segoe UI, Arial, sans-serif">System architecture</text>
  <text x="72" y="126" fill="#AFC8E0" font-size="20" font-family="Segoe UI, Arial, sans-serif">A multi-stage retrieval pipeline designed for region-aware EV support workflows.</text>

  <rect x="72" y="188" width="320" height="136" rx="24" fill="#0F2238" stroke="#244867"/>
  <text x="98" y="230" fill="#8FD4FF" font-size="18" font-family="Segoe UI, Arial, sans-serif">1. Ingestion</text>
  <text x="98" y="272" fill="white" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">PDF parsing + metadata</text>
  <text x="98" y="306" fill="#D6E5F2" font-size="18" font-family="Segoe UI, Arial, sans-serif">market, model, language, doc type</text>

  <rect x="432" y="188" width="320" height="136" rx="24" fill="#0F2238" stroke="#244867"/>
  <text x="458" y="230" fill="#8FD4FF" font-size="18" font-family="Segoe UI, Arial, sans-serif">2. Vector storage</text>
  <text x="458" y="272" fill="white" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Qdrant collections</text>
  <text x="458" y="306" fill="#D6E5F2" font-size="18" font-family="Segoe UI, Arial, sans-serif">specs, manuals, service, policy</text>

  <rect x="792" y="188" width="320" height="136" rx="24" fill="#0F2238" stroke="#244867"/>
  <text x="818" y="230" fill="#8FD4FF" font-size="18" font-family="Segoe UI, Arial, sans-serif">3. Stage 1 routing</text>
  <text x="818" y="272" fill="white" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Heuristic candidate scoring</text>
  <text x="818" y="306" fill="#D6E5F2" font-size="18" font-family="Segoe UI, Arial, sans-serif">semantic + keyword + metadata priors</text>

  <rect x="1152" y="188" width="320" height="136" rx="24" fill="#0F2238" stroke="#244867"/>
  <text x="1178" y="230" fill="#8FD4FF" font-size="18" font-family="Segoe UI, Arial, sans-serif">4. Stage 2 routing</text>
  <text x="1178" y="272" fill="white" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">LLM route decision</text>
  <text x="1178" y="306" fill="#D6E5F2" font-size="18" font-family="Segoe UI, Arial, sans-serif">primary + secondary collections</text>

  <rect x="72" y="430" width="360" height="160" rx="24" fill="#0A1B2E" stroke="#1E4869"/>
  <text x="100" y="474" fill="#7CE0C3" font-size="18" font-family="Segoe UI, Arial, sans-serif">5. Query planner</text>
  <text x="100" y="518" fill="white" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Sub-question decomposition</text>
  <text x="100" y="554" fill="#D7E4F1" font-size="18" font-family="Segoe UI, Arial, sans-serif">
    <tspan x="100" dy="0">Used for comparisons and</tspan>
    <tspan x="100" dy="28">multi-source questions</tspan>
  </text>

  <rect x="470" y="430" width="420" height="160" rx="24" fill="#0A1B2E" stroke="#1E4869"/>
  <text x="498" y="474" fill="#7CE0C3" font-size="18" font-family="Segoe UI, Arial, sans-serif">6. Retrieval layer</text>
  <text x="498" y="518" fill="white" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Filtered multi-collection search</text>
  <text x="498" y="554" fill="#D7E4F1" font-size="18" font-family="Segoe UI, Arial, sans-serif">
    <tspan x="498" dy="0">reranking boosts for market, model,</tspan>
    <tspan x="498" dy="28">language, reliability, and priority</tspan>
  </text>

  <rect x="928" y="430" width="260" height="160" rx="24" fill="#0A1B2E" stroke="#1E4869"/>
  <text x="956" y="474" fill="#7CE0C3" font-size="18" font-family="Segoe UI, Arial, sans-serif">7. Confidence layer</text>
  <text x="956" y="518" fill="white" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">High / medium / low</text>
  <text x="956" y="554" fill="#D7E4F1" font-size="18" font-family="Segoe UI, Arial, sans-serif">
    <tspan x="956" dy="0">blended route and</tspan>
    <tspan x="956" dy="28">retrieval signal</tspan>
  </text>

  <rect x="1226" y="430" width="246" height="160" rx="24" fill="#0A1B2E" stroke="#1E4869"/>
  <text x="1254" y="474" fill="#7CE0C3" font-size="18" font-family="Segoe UI, Arial, sans-serif">8. Fallback</text>
  <text x="1254" y="518" fill="white" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Labeled web path</text>
  <text x="1254" y="554" fill="#D7E4F1" font-size="18" font-family="Segoe UI, Arial, sans-serif">
    <tspan x="1254" dy="0">only when internal</tspan>
    <tspan x="1254" dy="28">evidence is weak</tspan>
  </text>

  <rect x="314" y="740" width="972" height="170" rx="28" fill="#0F2337" stroke="#27648A"/>
  <text x="352" y="786" fill="#9ED8FF" font-size="20" font-family="Segoe UI, Arial, sans-serif">9. Final response layer</text>
  <text x="352" y="836" fill="white" font-size="34" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Structured answer + evidence cards + analytics logging</text>
  <text x="352" y="876" fill="#D6E6F3" font-size="20" font-family="Segoe UI, Arial, sans-serif">Short answer • Evidence by source • Regional caveats • Uncertainty • Route telemetry</text>

  <path d="M392 256H432" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>
  <path d="M752 256H792" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>
  <path d="M1112 256H1152" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>

  <path d="M232 324V430" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>
  <path d="M592 324V430" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>
  <path d="M952 324V430" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>
  <path d="M1312 324V430" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>

  <path d="M252 590C252 698 314 740 314 740" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>
  <path d="M680 590V740" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>
  <path d="M1058 590V740" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>
  <path d="M1349 590C1349 698 1286 740 1286 740" stroke="#3E85B5" stroke-width="4" stroke-linecap="round"/>
</svg>
