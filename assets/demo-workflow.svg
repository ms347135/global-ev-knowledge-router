<svg width="1600" height="620" viewBox="0 0 1600 620" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1600" height="620" rx="28" fill="#091320"/>
  <text x="72" y="84" fill="white" font-size="42" font-weight="700" font-family="Segoe UI, Arial, sans-serif">One-minute demo workflow</text>
  <text x="72" y="122" fill="#ABC5DD" font-size="20" font-family="Segoe UI, Arial, sans-serif">A clean showcase path you can use immediately in interviews, portfolio videos, or GitHub demos.</text>

  <rect x="72" y="198" width="320" height="230" rx="24" fill="#0F2338" stroke="#204464"/>
  <circle cx="132" cy="258" r="30" fill="#0EC8B0"/>
  <text x="132" y="268" text-anchor="middle" fill="#062033" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">1</text>
  <text x="194" y="246" fill="white" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Launch app</text>
  <text x="110" y="316" fill="#D6E5F2" font-size="18" font-family="Segoe UI, Arial, sans-serif">
    <tspan x="110" dy="0">Start Streamlit, choose</tspan>
    <tspan x="110" dy="28">local Qdrant mode,</tspan>
    <tspan x="110" dy="28">and paste the OpenAI key.</tspan>
  </text>

  <rect x="438" y="198" width="320" height="230" rx="24" fill="#0F2338" stroke="#204464"/>
  <circle cx="498" cy="258" r="30" fill="#4F8CFF"/>
  <text x="498" y="268" text-anchor="middle" fill="white" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">2</text>
  <text x="560" y="246" fill="white" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Load demo data</text>
  <text x="476" y="316" fill="#D6E5F2" font-size="18" font-family="Segoe UI, Arial, sans-serif">
    <tspan x="476" dy="0">Use the one-click demo seed</tspan>
    <tspan x="476" dy="28">button to ingest the</tspan>
    <tspan x="476" dy="28">sample EV PDFs.</tspan>
  </text>

  <rect x="804" y="198" width="320" height="230" rx="24" fill="#0F2338" stroke="#204464"/>
  <circle cx="864" cy="258" r="30" fill="#FFC857"/>
  <text x="864" y="268" text-anchor="middle" fill="#1B2742" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">3</text>
  <text x="926" y="246" fill="white" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Ask a complex query</text>
  <text x="842" y="316" fill="#D6E5F2" font-size="18" font-family="Segoe UI, Arial, sans-serif">
    <tspan x="842" dy="0">Use a multi-collection</tspan>
    <tspan x="842" dy="28">question involving market,</tspan>
    <tspan x="842" dy="28">vehicle, and support intent.</tspan>
  </text>

  <rect x="1170" y="198" width="358" height="230" rx="24" fill="#0F2338" stroke="#204464"/>
  <circle cx="1230" cy="258" r="30" fill="#FF7A7A"/>
  <text x="1230" y="268" text-anchor="middle" fill="white" font-size="26" font-weight="700" font-family="Segoe UI, Arial, sans-serif">4</text>
  <text x="1292" y="246" fill="white" font-size="24" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Show route + evidence</text>
  <text x="1208" y="316" fill="#D6E5F2" font-size="18" font-family="Segoe UI, Arial, sans-serif">
    <tspan x="1208" dy="0">Walk through the route card,</tspan>
    <tspan x="1208" dy="28">sub-questions, confidence,</tspan>
    <tspan x="1208" dy="28">and supporting evidence.</tspan>
  </text>

  <path d="M392 312H438" stroke="#366D97" stroke-width="5" stroke-linecap="round"/>
  <path d="M758 312H804" stroke="#366D97" stroke-width="5" stroke-linecap="round"/>
  <path d="M1124 312H1170" stroke="#366D97" stroke-width="5" stroke-linecap="round"/>
</svg>
